services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mdba_mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: mdba_demo
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  mdba_mongo_data:
